name: Build macOS

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sdl3 sdl3_image dylibbundler

      - name: Install SDL2_mixer (SDL3_mixer not yet in homebrew)
        run: brew install sdl2_mixer

      - name: Build
        run: make

      - name: Create app bundle
        run: |
          APP="dist/Gigalomania.app"
          MACOS="$APP/Contents/MacOS"
          RES="$APP/Contents/Resources"
          LIBS="$APP/Contents/libs"

          mkdir -p "$MACOS" "$RES" "$LIBS"

          # Binary
          cp gigalomania "$MACOS/gigalomania_bin"

          # Launcher script — changes CWD to Resources so relative asset paths work
          cat > "$MACOS/gigalomania" << 'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$DIR/../Resources"
          exec "$DIR/gigalomania_bin" "$@"
          LAUNCHER
          chmod +x "$MACOS/gigalomania"

          # Assets
          cp -r gfx islands music sound readme.html "$RES/"

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>       <string>gigalomania</string>
              <key>CFBundleIdentifier</key>       <string>net.sourceforge.gigalomania</string>
              <key>CFBundleName</key>             <string>Gigalomania</string>
              <key>CFBundleDisplayName</key>      <string>Gigalomania</string>
              <key>CFBundleVersion</key>          <string>1.0</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundlePackageType</key>      <string>APPL</string>
              <key>CFBundleIconFile</key>         <string>gigalomania</string>
              <key>NSHighResolutionCapable</key>  <true/>
              <key>LSMinimumSystemVersion</key>   <string>10.13</string>
          </dict>
          </plist>
          PLIST

          # .icns icon from gigalomania64.png (sips + iconutil — built-in macOS tools)
          mkdir -p icon.iconset
          sips -z 16  16  gigalomania64.png --out icon.iconset/icon_16x16.png
          sips -z 32  32  gigalomania64.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32  32  gigalomania64.png --out icon.iconset/icon_32x32.png
          sips -z 64  64  gigalomania64.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 gigalomania64.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 gigalomania64.png --out icon.iconset/icon_128x128@2x.png
          iconutil -c icns icon.iconset -o "$RES/gigalomania.icns"

          # Bundle SDL3 dylibs — copies libs into Contents/libs/ and rewrites install names
          dylibbundler -od -b \
            -x "$MACOS/gigalomania_bin" \
            -d "$LIBS/" \
            -p @executable_path/../libs/

      - name: Create zip
        run: cd dist && zip -r ../gigalomania-macos.zip Gigalomania.app/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigalomania-macos
          path: gigalomania-macos.zip
