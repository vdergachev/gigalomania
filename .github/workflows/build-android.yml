name: Build Android

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    if: false  # temporarily disabled
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download SDL2 sources
        run: |
          JNI=android/Gigalomania/app/src/main/jni

          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.tar.gz | tar xz
          mv SDL2-2.28.5 $JNI/SDL

          curl -L https://github.com/libsdl-org/SDL_image/releases/download/release-2.6.3/SDL2_image-2.6.3.tar.gz | tar xz
          mv SDL2_image-2.6.3 $JNI/SDL_image

          curl -L https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.6.3/SDL2_mixer-2.6.3.tar.gz | tar xz
          mv SDL2_mixer-2.6.3 $JNI/SDL_mixer

          # Sync SDL Java files to match downloaded C source version
          cp $JNI/SDL/android-project/app/src/main/java/org/libsdl/app/*.java \
             android/Gigalomania/app/src/main/java/org/libsdl/app/

      - name: Copy game sources into jni/src
        run: |
          SRC=android/Gigalomania/app/src/main/jni/src
          cp *.cpp *.h "$SRC/"
          cp -r TinyXML "$SRC/"

      - name: Build APK
        run: cd android/Gigalomania && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: gigalomania-android
          path: android/Gigalomania/app/build/outputs/apk/debug/*.apk
