name: Build Android

on:
  push:
    branches: [ master, MMM-migrate-to-sdl3 ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download SDL3 sources
        run: |
          JNI=android/Gigalomania/app/src/main/jni

          git clone --depth=1 https://github.com/libsdl-org/SDL.git -b release-3.2.14 sdl3_src
          mv sdl3_src $JNI/SDL

          git clone --depth=1 https://github.com/libsdl-org/SDL_image.git -b release-3.2.4 sdl3_image_src
          mv sdl3_image_src $JNI/SDL_image

          # Keep SDL2_mixer until SDL3_mixer is stable and available
          curl -L https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.6.3/SDL2_mixer-2.6.3.tar.gz | tar xz
          mv SDL2_mixer-2.6.3 $JNI/SDL_mixer

          # Sync SDL3 Java files to match downloaded C source version
          cp $JNI/SDL/android-project/app/src/main/java/org/libsdl/app/*.java \
             android/Gigalomania/app/src/main/java/org/libsdl/app/

      - name: Copy game sources into jni/src
        run: |
          SRC=android/Gigalomania/app/src/main/jni/src
          cp *.cpp *.h "$SRC/"
          cp -r TinyXML "$SRC/"

      - name: Build APK
        run: cd android/Gigalomania && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: gigalomania-android
          path: android/Gigalomania/app/build/outputs/apk/debug/*.apk
