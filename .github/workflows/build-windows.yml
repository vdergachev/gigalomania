name: Build Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install SDL2 via vcpkg
        run: |
          vcpkg install sdl2 sdl2-image sdl2-mixer --triplet x64-windows
          vcpkg integrate install

      - name: Build Release
        run: msbuild gigalomania.sln /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnabled=true

      - name: Collect DLLs from vcpkg
        run: |
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          Get-ChildItem "$vcpkgBin\*.dll" | Copy-Item -Destination "x64\Release\"

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist\gigalomania
          Copy-Item "x64\Release\gigalomania.exe" "dist\gigalomania\"
          Copy-Item "x64\Release\*.dll" "dist\gigalomania\"
          Copy-Item -Recurse gfx "dist\gigalomania\gfx"
          Copy-Item -Recurse islands "dist\gigalomania\islands"
          Copy-Item -Recurse music "dist\gigalomania\music"
          Copy-Item -Recurse sound "dist\gigalomania\sound"
          Copy-Item readme.html "dist\gigalomania\"

      - name: Create zip
        run: Compress-Archive -Path dist\gigalomania -DestinationPath gigalomania-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigalomania-windows
          path: gigalomania-windows.zip
