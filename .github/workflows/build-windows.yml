name: Build Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install SDL2 via vcpkg
        run: |
          vcpkg install sdl2 sdl2-image sdl2-mixer --triplet x64-windows
          vcpkg integrate install

      - name: Build Release
        run: msbuild gigalomania.sln /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnabled=true

      - name: Package
        run: |
          $outDir = "x64\Release"
          $distDir = "dist\gigalomania"

          New-Item -ItemType Directory -Force -Path $distDir

          # Copy executable
          Copy-Item "$outDir\gigalomania.exe" $distDir

          # Copy DLLs from vcpkg (vcpkg integrate should place them in outDir, fallback to vcpkg bin)
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          Get-ChildItem "$vcpkgBin\*.dll" | Copy-Item -Destination $distDir

          # Copy game assets (xcopy is deterministic: /E includes subdirs, /I treats dest as dir, /Y no prompt)
          cmd /c xcopy /E /I /Y gfx     dist\gigalomania\gfx\
          cmd /c xcopy /E /I /Y islands dist\gigalomania\islands\
          cmd /c xcopy /E /I /Y music   dist\gigalomania\music\
          cmd /c xcopy /E /I /Y sound   dist\gigalomania\sound\
          Copy-Item readme.html $distDir

      - name: Verify package contents
        run: dir dist\gigalomania /s /b

      - name: Create zip
        run: Compress-Archive -Path dist\gigalomania -DestinationPath gigalomania-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigalomania-windows
          path: gigalomania-windows.zip
